# Internal Knowledge Graph — additive configuration
# No external graph DB. Local store under automation/knowledge/store/
# Does not alter frozen pipelines, schemas, or publishers.

version: "1.2"
description: >
  Knowledge Atoms → Canonical Entities → Relationships → Graph.
  Dataset manufacturing consumes the graph in a later sprint.

store:
  root: automation/knowledge/store
  atoms_dir: automation/knowledge/store/atoms
  entities_file: automation/knowledge/store/entities.json
  indexes_dir: automation/knowledge/store/indexes
  relationships_file: automation/knowledge/store/relationships.json
  stats_file: automation/knowledge/store/stats.json

atoms:
  enabled: true
  version: knowledge-atom-1.1.0
  strategy: semantic
  stable_id: true
  types:
    - heading
    - paragraph
    - table
    - bullet
    - faq
    - caption
    - metadata
    - section
  lifecycle:
    - ACTIVE
    - SUPERSEDED
    - MERGED
    - ARCHIVED
  min_text_chars: 1
  persist: true

entities:
  enabled: true
  resolve_aliases: true
  reuse_existing: true
  extractor_version: entity-extract-1.0.0
  status:
    - ACTIVE
    - MERGED
    - SUPERSEDED
    - ARCHIVED

knowledge_score:
  confidence: 0.35
  richness: 0.25
  completeness: 0.20
  source_quality: 0.15
  relationship_potential: 0.05

relationships:
  enabled: true
  extractor_version: relationship-extract-1.0.0
  # No generic related_to
  allow_related_to: false
  status:
    - ACTIVE
    - MERGED
    - SUPERSEDED
    - ARCHIVED
  taxonomy:
    Business:
      - provides
      - offers
      - manufactures
      - distributes
    Organization:
      - owns
      - managed_by
      - subsidiary_of
      - founded_by
    Market:
      - targets
      - serves
      - competes_with
    Technology:
      - uses
      - depends_on
      - integrates_with
      - replaces
      - implements
    Governance:
      - regulated_by
      - certified_by
      - audited_by
    Geography:
      - located_in
      - operates_in
      - headquartered_in
    Supply_Chain:
      - supplied_by
      - partner_of
      - purchased_from

manufacturing:
  write_dataset_rows: false
  graph_is_source_of_truth: true
