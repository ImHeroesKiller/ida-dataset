# Trusted source → Enterprise Function mapping (configuration only).
# Source IDs reference automation/config/source_registry.yaml.
# Discovery site hosts used for site: queries (trusted domains only).

version: "2.0"

# Default multi-function sources (broad enterprise coverage)
global_sources:
  - SRC-000004  # World Bank
  - SRC-000005  # OECD
  - SRC-IMF
  - SRC-000006  # ADB
  - SRC-000001  # BPS

by_function:
  finance:
    sources: [SRC-OJK, SRC-BI, SRC-IMF, SRC-000004, SRC-BEI, SRC-IFC]
    site_hosts: [ojk.go.id, bi.go.id, imf.org, worldbank.org, idx.co.id]
    query_examples:
      - "site:ojk.go.id risk management"
      - "site:bi.go.id monetary policy"
      - "site:imf.org financial stability"

  accounting:
    sources: [SRC-OJK, SRC-BEI, SRC-IFC, SRC-000005]
    site_hosts: [ifrs.org, ojk.go.id, idx.co.id, oecd.org]
