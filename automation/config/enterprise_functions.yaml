# Canonical Enterprise Function Taxonomy — IDA Dataset Factory v2.0
# Knowledge expansion only. Does NOT change dataset schemas or domain folder layout.
# Datasets remain under domains/business_development/ (frozen path).
# Business Development is one enterprise function among many.

version: "2.0"
description: >
  Every existing dataset (Industry, Company, Service, Product, Pain Point, Solution,
  Framework, Case Study, Buyer Persona, Decision Maker, Regulation, Risk, Trend,
  Opportunity, Competitor) must continuously grow across all enterprise functions.

# Product datasets (schema-frozen) — all functions may contribute knowledge
datasets:
  - industry_library
  - company_profile
  - service_library
  - product_catalog
  - pain_point_library
  - solution_library
  - framework_library
  - case_study_library
  - buyer_persona_library
  - decision_maker_library
  - regulation_library
  - risk_library
  - trend_library
  - opportunity_analysis
  - competitor_library

# Business priority weight (higher = manufacture first when gaps equal)
# Used for mission selection balance, not a finish line.
default_business_priority: 50

