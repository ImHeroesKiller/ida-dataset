# IDA Knowledge Network — Connector configuration
# No hardcoding of limits/domains in connector code.

version: "1.0"
enabled: true

# Architecture enforcement
rules:
  planner_never_calls_connectors_directly: true
  connector_never_writes_datasets: true
  connector_never_extracts_knowledge: true
  only_document_acquisition: true
  policy_decides: true
  scheduler_requests: true
  connector_executes: true
  domain_allowlist_only: true
  respect_robots_txt: true  # placeholder behavior

# Worker pool
workers:
  max_parallel_connectors: 8
  max_parallel_fetches: 16
  max_queue_documents: 100000
  max_connectors: 100

# Defaults applied when a connector omits a field
defaults:
  enabled: false
  priority: 50
  trust_score: 0.70
  rate_limit_per_minute: 30
  retries: 3
  timeout_seconds: 30
  backoff_base_seconds: 1.0
  backoff_max_seconds: 60.0
  circuit_breaker_failures: 5
  circuit_breaker_cooldown_seconds: 300
  cache_ttl_seconds: 86400
  review_requirement: true
  dry_run: true
  scheduler_access: true
  policy_access: true

# Paths
paths:
  registry: metadata/connectors/registry.csv
  document_incoming: automation/documents/incoming
  document_processing: automation/documents/processing
  document_processed: automation/documents/processed
  document_failed: automation/documents/failed
  connector_cache: automation/connectors/cache
  search_cache: automation/search/cache
  events: automation/connectors/cache/events.jsonl
  metrics: automation/connectors/cache/metrics.json
  source_registry: metadata/source_registry.csv

# Connector instances (Phase 1 — architecture placeholders)
connectors:
