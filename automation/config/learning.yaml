    title: Procurement × Regulation knowledge
    target_dataset: regulation_library
    domain: business_development
    enterprise_function: procurement
    priority: P2
    kind: continuous

# Architecture enforcement
rules:
  continuous_never_stops: true
  directed_never_bypasses_policies: true
  planner_never_bypasses_scheduler: true
  publisher_never_bypasses_review: true
  telemetry_logs_everything: true
  everything_starts_from_scheduler: true

# Paths (relative to repo root)
paths:
  missions_root: automation/missions
  missions_active: automation/missions/missions
  missions_templates: automation/missions/templates
  missions_history: automation/missions/history
  missions_attachments: automation/missions/attachments
  missions_contracts: automation/missions/contracts
  learning_queue: automation/scheduler/state/learning_queue.json
  scheduler_state: automation/scheduler/state/scheduler_state.json
  metrics: automation/scheduler/state/metrics.json
  learning_reports: reports/learning

# Tick / cycle
scheduler:
  max_tasks_per_tick: 5
  default_mission_allocation_pct: 30
  state_dir: automation/scheduler/state

# ---------------------------------------------------------------------------
# Learning Mode — Development vs Production (architecture unchanged)
# Controlled here only. Default: development.
# ---------------------------------------------------------------------------
learning_mode:
  # development | production
  mode: development

  # Development: review bypassed → validated candidates enter publish queue → auto publish
  # Production: review required → manual approval → publish
  development:
    auto_publish: true
    progressive_publish: true
    review_bypassed: true
    publish_mode: auto          # auto | manual
    publish_rate: 1             # rows per unit
    publish_rate_unit: rows_per_second
    # Future: 2 | 5 | 10 | 0 (0 = unlimited)

  production:
    auto_publish: false
    progressive_publish: false
    review_bypassed: false
    publish_mode: manual
    publish_rate: 1
    publish_rate_unit: rows_per_second

paths_publish:
  publish_queue: automation/queue/publish
  publish_state: automation/learning/state/publish_state.json
  knowledge_feed: automation/learning/state/knowledge_feed.jsonl

