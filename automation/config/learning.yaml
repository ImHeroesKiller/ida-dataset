# Continuous Learning Scheduler — configuration
# Never hardcode allocation ratios in code; always load from here.

version: "1.0"
enabled: true

# Continuous Learning never stops; Directed Learning never disables it.
streams:
  continuous:
    enabled: true
    never_stop: true
    description: Close knowledge gaps automatically
  directed:
    enabled: true
    never_disable_continuous: true
    description: Execute explicit human learning missions

# Default resource allocation (percent; must sum to 100)
allocation:
  default:
    continuous: 70
    directed: 30
    maintenance: 0
    ontology: 0
    policy: 0
  # When any P0 (Critical) directed mission is active
  critical_mission:
    continuous: 20
    directed: 80
    maintenance: 0
    ontology: 0
    policy: 0
  # When only P1 high missions are active (no P0)
  high_mission:
    continuous: 40
    directed: 55
    maintenance: 5
    ontology: 0
    policy: 0
  # Idle (no directed missions)
  idle:
    continuous: 85
    directed: 0
    maintenance: 5
    ontology: 5
    policy: 5

# Priority → weight for queue scoring
priorities:
  P0:
    label: Critical
    weight: 1000
  P1:
    label: High
    weight: 500
  P2:
    label: Medium
    weight: 200
  P3:
    label: Low
    weight: 50
  P4:
    label: Background
    weight: 10

# Continuous learning backlog seeds (gap-driven; not extraction)
# Domain path remains domains/business_development/ (frozen layout).
# enterprise_function generalizes manufacturing beyond Business Development alone.
continuous_catalog:
  # Default production mission — Produce Industry Dataset (lowest coverage first)
  - task_id: CL-IND-001
    title: Produce Industry Dataset
    target_dataset: industry_library
    domain: business_development
    enterprise_function: multi
    priority: P0
    kind: continuous
    mission_id: MIS-PRODUCE-INDUSTRY-DATASET
    priority_rule: lowest_industry_field_coverage_first
    phase1_target: 50
    stretch_target: 100

  - task_id: CL-PAIN-001
    title: Expand Pain Point Library
    target_dataset: pain_point_library
    domain: business_development
    enterprise_function: multi
    priority: P3
    kind: continuous
  - task_id: CL-CASE-001
    title: Collect new Case Studies
    target_dataset: case_study_library
    domain: business_development
    enterprise_function: multi
    priority: P3
    kind: continuous
  - task_id: CL-PERSONA-001
    title: Produce Buyer Persona Dataset
    target_dataset: buyer_persona_library
    domain: business_development
    enterprise_function: multi
    priority: P1
    kind: continuous
    mission_id: MIS-PRODUCE-BUYER-PERSONA
  - task_id: CL-DM-001
    title: Produce Decision Maker Dataset
    target_dataset: decision_maker_library
    domain: business_development
    enterprise_function: multi
    priority: P1
    kind: continuous
    mission_id: MIS-PRODUCE-DECISION-MAKER
  - task_id: CL-REG-001
    title: Produce Regulation Dataset
    target_dataset: regulation_library
    domain: business_development
    enterprise_function: multi
    priority: P1
    kind: continuous
    mission_id: MIS-PRODUCE-REGULATION
  - task_id: CL-RISK-001
    title: Produce Risk Dataset
    target_dataset: risk_library
    domain: business_development
    enterprise_function: multi
    priority: P1
    kind: continuous
    mission_id: MIS-PRODUCE-RISK
  - task_id: CL-TREND-001
    title: Produce Trend Dataset
    target_dataset: trend_library
    domain: business_development
    enterprise_function: multi
    priority: P1
    kind: continuous
    mission_id: MIS-PRODUCE-TREND
  - task_id: CL-COMP-001
    title: Produce Competitor Dataset
    target_dataset: competitor_library
    domain: business_development
    enterprise_function: multi
    priority: P1
    kind: continuous
    mission_id: MIS-PRODUCE-COMPETITOR
  - task_id: CL-FW-001
    title: Refresh Frameworks
    target_dataset: framework_library
    domain: business_development
    enterprise_function: multi
    priority: P4
    kind: continuous
  - task_id: CL-SIG-001
    title: Expand Business Signal Library
    target_dataset: business_signal_library
    domain: business_development
    enterprise_function: multi
    priority: P3
    kind: continuous
  # Function-balanced seeds (same datasets; different enterprise contexts)
  - task_id: CL-EF-FIN-RISK
    title: Finance × Risk knowledge
    target_dataset: risk_library
    domain: business_development
    enterprise_function: finance
    priority: P2
    kind: continuous
  - task_id: CL-EF-HR-PERSONA
    title: HR × Buyer Persona knowledge
    target_dataset: buyer_persona_library
    domain: business_development
    enterprise_function: human_resources
    priority: P2
    kind: continuous
  - task_id: CL-EF-IT-TREND
    title: IT × Trend knowledge
    target_dataset: trend_library
    domain: business_development
