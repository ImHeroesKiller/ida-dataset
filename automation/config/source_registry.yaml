# Extensible Trusted Source Registry — data-driven only.
# Add a new source by appending one entry here (or a YAML file under sources/).
# No code changes required in learning_session / scheduler / dashboard / publisher.

version: "2.0"
description: "Trusted knowledge sources for IDA Dataset Factory acquisition engine"

defaults:
  enabled: false
  priority: 50
  trust_score: 0.80
  minimum_confidence: 0.80
  rate_limit: 20
  timeout: 30
  retry: 3
  language: en
  country: multi
  archive_documents: true
  publish: true
  update_frequency: weekly
  authentication: none

