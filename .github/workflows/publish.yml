name: Publish

on:
  schedule:
    # Daily publish attempt 08:00 UTC (after review)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      dry_run:
        description: Dry run (no writes, no commits, no pushes)
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      commit:
        description: Commit after successful publish
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      push:
        description: Push after commit
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  publish:
    name: Publish approved knowledge
    runs-on: ubuntu-latest
    env:
      IDA_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity
        if: ${{ github.event_name == 'schedule' || (github.event.inputs.dry_run == 'false' && github.event.inputs.commit == 'true') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve publish flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled publish: real env, dry-run false, commit+push for production knowledge
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "commit=true" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "commit=${{ github.event.inputs.commit }}" >> "$GITHUB_OUTPUT"
            echo "push=${{ github.event.inputs.push }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run publisher
        id: publish
        env:
          IDA_ENVIRONMENT: ${{ steps.flags.outputs.environment }}
          DRY_RUN: ${{ steps.flags.outputs.dry_run }}
        run: |
          set +e
          EXTRA_ARGS=()
          if [ "${DRY_RUN}" = "true" ]; then
            EXTRA_ARGS+=(--dry-run)
          else
            EXTRA_ARGS+=(--no-dry-run)
          fi
          if [ "${{ steps.flags.outputs.commit }}" = "true" ]; then
            EXTRA_ARGS+=(--commit)
          fi
          if [ "${{ steps.flags.outputs.push }}" = "true" ]; then
            EXTRA_ARGS+=(--push)
          fi
          python automation/ci/publish_ci.py \
            --environment "${IDA_ENVIRONMENT}" \
            "${EXTRA_ARGS[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit ${code}

      - name: Upload publish reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-reports
          path: |
            reports/publish/publish_report.md
            reports/publish/
          if-no-files-found: warn

      - name: Enforce exit code
        if: always() && steps.publish.outputs.exit_code != '0'
        run: |
          echo "Publish blocked or failed (exit ${{ steps.publish.outputs.exit_code }})"
          echo "0=success 1=validation 2=config 3=policy 4=publisher_blocked"
          exit ${{ steps.publish.outputs.exit_code }}
