name: Export

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: Dataset relative path
        required: false
        default: domains/business_development/industry_library.csv
  workflow_call:

permissions:
  contents: write

jobs:
  export:
    name: Export datasets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export industry library
        run: |
          python3 - <<'PY'
          from automation.export.packager import export_dataset
          import json
          r = export_dataset(
              formats=["jsonl", "openai", "huggingface"],
          )
          print(json.dumps(r, indent=2))
          if not r.get("ok"):
              raise SystemExit(1)
          PY
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: factory-exports
          path: |
            exports/jsonl/**
            exports/openai/**
            exports/huggingface/**
          if-no-files-found: warn
