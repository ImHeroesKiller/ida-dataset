name: Learn

# Continuous Learning Scheduler is triggered by GitHub Actions schedule
# instead of a long-running Python runtime.
#
# Architecture unchanged:
#   Scheduler → Planner → Policy → Connector → Pipeline → Review → Publisher → Telemetry
#
# Reliability (Factory Reliability Sprint):
#   - concurrency factory-production (no concurrent writers)
#   - dynamic mission selection (no hardcoded default mission)
#   - safe git fetch/rebase/push (no force-push, no lost history)

on:
  schedule:
    # Continuous learning every 15 minutes (non-overlapping via concurrency group)
    - cron: "*/15 * * * *"
    # Daily deep learning pass 06:00 UTC (still covered by */15; tag as daily)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      dry_run:
        description: Dry run (no dataset mutations; session still saved)
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      mission:
        description: Explicit mission (leave empty for dynamic scheduler selection)
        required: false
        default: ""
        type: string
      trigger:
        description: Trigger label for session metadata
        required: false
        default: manual
        type: choice
        options:
          - manual
          - mission
          - hourly
          - daily
          - schedule
      commit_session:
        description: Commit session artifacts back to the repository
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  actions: read

# P0-2: only one production writer at a time (queued)
concurrency:
  group: factory-production
  cancel-in-progress: false

jobs:
  learning:
    name: Learning session
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      IDA_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      # Empty default → learning_session selects mission dynamically
      IDA_LEARNING_INSTRUCTION: ${{ github.event.inputs.mission || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve schedule defaults
        id: cfg
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ]; then
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            # Daily deep pass at 06:00 UTC; otherwise continuous 15-minute cadence
            if [ "$HOUR" = "06" ] && [ "$MIN" = "00" ]; then
              echo "trigger=daily" >> "$GITHUB_OUTPUT"
            else
              echo "trigger=schedule" >> "$GITHUB_OUTPUT"
            fi
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "commit_session=true" >> "$GITHUB_OUTPUT"
            # Empty instruction → dynamic mission selector
            echo "instruction=" >> "$GITHUB_OUTPUT"
          else
            echo "trigger=${{ github.event.inputs.trigger || 'manual' }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.inputs.environment || 'development' }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run || 'true' }}" >> "$GITHUB_OUTPUT"
            echo "commit_session=${{ github.event.inputs.commit_session || 'true' }}" >> "$GITHUB_OUTPUT"
            echo "instruction<<EOF" >> "$GITHUB_OUTPUT"
            echo "${IDA_LEARNING_INSTRUCTION}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity
        if: steps.cfg.outputs.commit_session == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Worktree trace (pre-acquire)
        if: always()
        run: python automation/ci/worktree_trace.py --stage pre_acquire || true

      - name: Run learning session
        id: learn
        env:
          IDA_ENVIRONMENT: ${{ steps.cfg.outputs.environment }}
          DRY_RUN: ${{ steps.cfg.outputs.dry_run }}
        run: |
          set +e
          EXTRA=()
          if [ "${DRY_RUN}" = "true" ]; then
            EXTRA+=(--dry-run)
          else
            EXTRA+=(--no-dry-run)
          fi
          EXTRA+=(--environment "${IDA_ENVIRONMENT}")
          EXTRA+=(--trigger "${{ steps.cfg.outputs.trigger }}")
          # Empty instruction triggers mission_selector inside learning_session.py
          EXTRA+=(--instruction "${{ steps.cfg.outputs.instruction }}")
          EXTRA+=(--mission "${{ steps.cfg.outputs.instruction }}")
          EXTRA+=(--pace 0.12)
          OUT=$(python automation/ci/learning_session.py "${EXTRA[@]}" 2> /tmp/learning_stderr.txt)
          code=$?
          echo "$OUT" | tee /tmp/learning_stdout.json
          SID=$(python -c "import json,sys; print(json.load(open('/tmp/learning_stdout.json')).get('session_id',''))" 2>/dev/null || true)
          echo "session_id=${SID}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [ -s /tmp/learning_stderr.txt ]; then
            echo "::group::stderr"
            cat /tmp/learning_stderr.txt
            echo "::endgroup::"
          fi
          exit ${code}

      # Flush all writers BEFORE any git operation (no background tasks into git phase)
      - name: Finalize writers
        if: always() && steps.cfg.outputs.commit_session == 'true'
        run: python automation/ci/finalize_writers.py

      - name: Worktree diagnostics (post-session)
        if: always() && steps.cfg.outputs.commit_session == 'true'
        run: |
          python automation/ci/worktree_trace.py --stage post_session_pre_commit
          python automation/ci/certify_worktree.py --help >/dev/null
          # Capture full diagnostic set for reliability reports
          python - <<'PY'
          from pathlib import Path
          import subprocess
          root = Path(".").resolve()
          out = root / "reports" / "reliability" / "worktree_before_sync.md"
          out.parent.mkdir(parents=True, exist_ok=True)
          parts = []
          for args in (
              ["status", "--porcelain=v1"],
              ["diff", "--name-only"],
              ["diff", "--stat"],
              ["status"],
          ):
              r = subprocess.run(["git", *args], capture_output=True, text=True)
              parts.append(f"## git {' '.join(args)}\n\n```\n{(r.stdout or '').rstrip() or '(empty)'}\n```\n")
          out.write_text("# Worktree Before Sync\n\n" + "\n".join(parts), encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
          PY

      - name: Upload learning session artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learning-session-${{ steps.learn.outputs.session_id || github.run_id }}
          path: |
            automation/sessions/
            reports/learning/
            reports/reliability/
            reports/production/
            reports/discovery/
            reports/performance/
            reports/manufacturing/
            automation/learning/state/
          if-no-files-found: warn

      # Certify clean worktree: stage + commit until porcelain (tracked) is empty.
      # NO Python tracers writing into reports/ after this succeeds (use --ephemeral only).
      - name: Certify worktree and atomic commit
        if: always() && steps.cfg.outputs.commit_session == 'true'
        id: commit
        run: |
          set -euo pipefail
          DRY_FLAG=()
          if [ "${{ steps.cfg.outputs.dry_run }}" = "true" ]; then
            DRY_FLAG+=(--dry-run-session)
          fi
          SID="${{ steps.learn.outputs.session_id || github.run_id }}"
          python automation/ci/finalize_writers.py
          set +e
          OUT=$(python automation/ci/certify_worktree.py \
            "${DRY_FLAG[@]}" \
            --max-rounds 6 \
            --message "chore(learning): session ${SID} via GitHub Actions" 2>&1)
          code=$?
          set -e
          echo "$OUT"
          if [ "$code" -ne 0 ]; then
            echo "Worktree certification failed — listing remaining dirt"
            git status --porcelain=v1 || true
            git diff --name-only || true
            git diff --stat || true
            exit 1
          fi
          # Prefer push whenever local has commits not on remote, or we made commits
          MADE=$(echo "$OUT" | sed -n 's/^COMMITS_MADE=//p' | tail -1)
          MADE=${MADE:-0}
          AHEAD=0
          if git rev-parse --verify "origin/${{ github.ref_name }}" >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count "origin/${{ github.ref_name }}..HEAD" 2>/dev/null || echo 0)
          else
            AHEAD=1
          fi
          if [ "${MADE}" != "0" ] || [ "${AHEAD}" != "0" ]; then
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi
          # Final hard check: tracked clean — no post-commit writers allowed after this
          git update-index --refresh
          DIRTY="$(git status --porcelain=v1 --untracked-files=no 2>/dev/null || true)"
          if [[ -n "${DIRTY}" ]]; then
            echo "ERROR: tracked tree still dirty after certification:"
            echo "${DIRTY}"
            exit 1
          fi
          echo "CERTIFIED: tracked worktree clean before sync (commits_made=${MADE} ahead=${AHEAD})"

      - name: Safe git sync and push
        if: always() && steps.cfg.outputs.commit_session == 'true' && steps.commit.outputs.committed == 'true'
        id: push
        run: |
          chmod +x scripts/git_safe_sync_push.sh
          # Ephemeral only — must NOT write reports/ after certification
          python automation/ci/worktree_trace.py --stage before_safe_push --ephemeral || true
          scripts/git_safe_sync_push.sh origin "${{ github.ref_name }}"
          python automation/ci/worktree_trace.py --stage after_safe_push --ephemeral || true
        env:
          GIT_SAFE_PUSH_RETRIES: "3"

      - name: Enforce exit code
        if: always() && steps.learn.outputs.exit_code != '0'
        run: |
          echo "Learning session failed (exit ${{ steps.learn.outputs.exit_code }})"
          exit ${{ steps.learn.outputs.exit_code }}
