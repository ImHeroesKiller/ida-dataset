name: Learn

# Continuous Learning Scheduler is triggered by GitHub Actions schedule
# instead of a long-running Python runtime.
#
# Architecture unchanged:
#   Scheduler → Planner → Policy → Connector → Pipeline → Review → Publisher → Telemetry
#
# Reliability (Factory Reliability Sprint):
#   - concurrency factory-production (no concurrent writers)
#   - dynamic mission selection (no hardcoded default mission)
#   - safe git fetch/rebase/push (no force-push, no lost history)

on:
  schedule:
    # Hourly continuous learning
    - cron: "0 * * * *"
    # Daily deep learning pass 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      dry_run:
        description: Dry run (no dataset mutations; session still saved)
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      mission:
        description: Explicit mission (leave empty for dynamic scheduler selection)
        required: false
        default: ""
        type: string
      trigger:
        description: Trigger label for session metadata
        required: false
        default: manual
        type: choice
        options:
          - manual
          - mission
          - hourly
          - daily
          - schedule
      commit_session:
        description: Commit session artifacts back to the repository
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  actions: read

# P0-2: only one production writer at a time (queued)
concurrency:
  group: factory-production
  cancel-in-progress: false

jobs:
  learning:
    name: Learning session
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      IDA_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      # Empty default → learning_session selects mission dynamically
      IDA_LEARNING_INSTRUCTION: ${{ github.event.inputs.mission || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve schedule defaults
        id: cfg
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "06" ]; then
              echo "trigger=daily" >> "$GITHUB_OUTPUT"
            else
              echo "trigger=hourly" >> "$GITHUB_OUTPUT"
            fi
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "commit_session=true" >> "$GITHUB_OUTPUT"
            # Empty instruction → dynamic mission selector
            echo "instruction=" >> "$GITHUB_OUTPUT"
          else
            echo "trigger=${{ github.event.inputs.trigger || 'manual' }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.inputs.environment || 'development' }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run || 'true' }}" >> "$GITHUB_OUTPUT"
            echo "commit_session=${{ github.event.inputs.commit_session || 'true' }}" >> "$GITHUB_OUTPUT"
            echo "instruction<<EOF" >> "$GITHUB_OUTPUT"
            echo "${IDA_LEARNING_INSTRUCTION}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity
        if: steps.cfg.outputs.commit_session == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Worktree trace (pre-acquire)
        if: always()
        run: python automation/ci/worktree_trace.py --stage pre_acquire || true

      - name: Run learning session
        id: learn
        env:
          IDA_ENVIRONMENT: ${{ steps.cfg.outputs.environment }}
          DRY_RUN: ${{ steps.cfg.outputs.dry_run }}
        run: |
          set +e
          EXTRA=()
          if [ "${DRY_RUN}" = "true" ]; then
            EXTRA+=(--dry-run)
          else
            EXTRA+=(--no-dry-run)
          fi
          EXTRA+=(--environment "${IDA_ENVIRONMENT}")
          EXTRA+=(--trigger "${{ steps.cfg.outputs.trigger }}")
          # Empty instruction triggers mission_selector inside learning_session.py
          EXTRA+=(--instruction "${{ steps.cfg.outputs.instruction }}")
          EXTRA+=(--mission "${{ steps.cfg.outputs.instruction }}")
          EXTRA+=(--pace 0.12)
          OUT=$(python automation/ci/learning_session.py "${EXTRA[@]}" 2> /tmp/learning_stderr.txt)
          code=$?
          echo "$OUT" | tee /tmp/learning_stdout.json
          SID=$(python -c "import json,sys; print(json.load(open('/tmp/learning_stdout.json')).get('session_id',''))" 2>/dev/null || true)
          echo "session_id=${SID}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [ -s /tmp/learning_stderr.txt ]; then
            echo "::group::stderr"
            cat /tmp/learning_stderr.txt
            echo "::endgroup::"
          fi
          exit ${code}

      - name: Worktree trace (post-session / pre-commit)
        if: always()
        run: python automation/ci/worktree_trace.py --stage post_session_pre_commit || true

      - name: Upload learning session artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learning-session-${{ steps.learn.outputs.session_id || github.run_id }}
          path: |
            automation/sessions/
            reports/learning/
            reports/reliability/
            reports/production/
            reports/discovery/
            reports/performance/
            reports/manufacturing/
            automation/learning/state/
          if-no-files-found: warn

      # Atomic production commit: stage ALL factory outputs, then single commit, then verify clean.
      # Never write after this step (except residual recovery inside git_safe_sync_push).
      - name: Atomic commit (session + knowledge + reports)
        if: always() && steps.cfg.outputs.commit_session == 'true'
        id: commit
        run: |
          set -euo pipefail
          python automation/ci/worktree_trace.py --stage pre_atomic_commit || true

          # Stage complete production footprint (tracked + new allowlisted paths)
          git add \
            automation/sessions/ \
            automation/learning/state/ \
            automation/queue/ \
            automation/missions/ \
            reports/learning/ \
            reports/reliability/ \
            reports/production/ \
            reports/discovery/ \
            reports/performance/ \
            reports/manufacturing/ \
            reports/quality/ \
            2>/dev/null || true

          if [ "${{ steps.cfg.outputs.dry_run }}" != "true" ]; then
            git add domains/ 2>/dev/null || true
          fi

          # Include any other already-tracked dirty files so tree is clean post-commit
          # (avoids "cannot pull with rebase: You have unstaged changes")
          while IFS= read -r line; do
            [[ -z "${line}" ]] && continue
            path="${line:3}"
            # skip ignored-only noise handled by status porcelain for untracked large caches
            if [[ "${line:0:2}" == "??" ]]; then
              case "${path}" in
                automation/connectors/cache/*|automation/raw_documents/*|automation/documents/*|node_modules/*|.next/*)
                  continue
                  ;;
              esac
            fi
            git add -- "${path}" 2>/dev/null || true
          done < <(git status --porcelain 2>/dev/null || true)

          if git diff --cached --quiet; then
            echo "No session artifacts to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            python automation/ci/worktree_trace.py --stage atomic_commit_empty || true
            exit 0
          fi

          SID="${{ steps.learn.outputs.session_id || github.run_id }}"
          git commit -m "chore(learning): session ${SID} via GitHub Actions"
          echo "committed=true" >> "$GITHUB_OUTPUT"

          python automation/ci/worktree_trace.py --stage post_commit || true

          # Verify clean tree (tracked). Untracked ignored caches may remain.
          if ! git diff --exit-code >/dev/null 2>&1; then
            echo "ERROR: unstaged tracked changes after commit"
            git diff --stat || true
            git status --porcelain || true
            exit 1
          fi
          if ! git diff --cached --exit-code >/dev/null 2>&1; then
            echo "ERROR: staged changes remain after commit"
            git diff --cached --stat || true
            exit 1
          fi
          # Porcelain may still list untracked gitignored paths — filter noise
          DIRTY="$(git status --porcelain --untracked-files=no 2>/dev/null || true)"
          if [[ -n "${DIRTY}" ]]; then
            echo "ERROR: dirty tracked tree after atomic commit:"
            echo "${DIRTY}"
            exit 1
          fi
          echo "Atomic commit verified: tracked tree clean"
          python automation/ci/worktree_trace.py --stage pre_fetch_clean || true

      - name: Safe git sync and push
        if: always() && steps.cfg.outputs.commit_session == 'true' && steps.commit.outputs.committed == 'true'
        id: push
        run: |
          chmod +x scripts/git_safe_sync_push.sh
          python automation/ci/worktree_trace.py --stage before_safe_push || true
          scripts/git_safe_sync_push.sh origin "${{ github.ref_name }}"
          python automation/ci/worktree_trace.py --stage after_safe_push || true
        env:
          GIT_SAFE_PUSH_RETRIES: "3"

      - name: Enforce exit code
        if: always() && steps.learn.outputs.exit_code != '0'
        run: |
          echo "Learning session failed (exit ${{ steps.learn.outputs.exit_code }})"
          exit ${{ steps.learn.outputs.exit_code }}
