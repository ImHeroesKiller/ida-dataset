name: Quality

on:
  schedule:
    # Daily review summary 07:00 UTC (after daily learning)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      dry_run:
        description: Dry run
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  review:
    name: Review summary
    runs-on: ubuntu-latest
    env:
      IDA_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate review summary
        id: review
        run: |
          set +e
          if [ "${DRY_RUN}" = "true" ]; then
            python automation/ci/review_summary.py --environment "${IDA_ENVIRONMENT}" --dry-run
          else
            python automation/ci/review_summary.py --environment "${IDA_ENVIRONMENT}" --no-dry-run
          fi
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit ${code}

      - name: Upload review reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-reports
          path: |
            reports/review/review_summary.md
            reports/review/
            automation/review/
          if-no-files-found: warn

      - name: Enforce exit code
        if: always() && steps.review.outputs.exit_code != '0'
        run: exit ${{ steps.review.outputs.exit_code }}
